version: "3.9"

services:

  # ─── Data Layer ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: atlas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Layer ─────────────────────────────────────────────────────

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DSN: postgresql+asyncpg://atlas:${POSTGRES_PASSWORD}@postgres/atlas
      REDIS_URL: redis://redis:6379/0
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
      PC_WORKER_SECRET: ${PC_WORKER_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: claude-3-haiku-20240307
      REDIS_URL: redis://redis:6379/0
      API_BASE_URL: http://api:8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: ./services/bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS}
      API_BASE_URL: http://api:8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      api:
        condition: service_healthy

  memory:
    build:
      context: ./services/memory
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql+asyncpg://atlas:${POSTGRES_PASSWORD}@postgres/atlas
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy

  whatsapp:
    build:
      context: ./services/whatsapp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  chroma_data:
