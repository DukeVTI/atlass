version: "3.9"

services:

  # ─── Data Layer ────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: atlas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma

  # ─── Application Layer ─────────────────────────────────────────────────────

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DSN: postgresql+asyncpg://atlas:${POSTGRES_PASSWORD}@postgres/atlas
      REDIS_URL: redis://redis:6379/0
      WORKER_TOKEN: ${WORKER_TOKEN}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-20241022}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-700}
      CLAUDE_TEMPERATURE: ${CLAUDE_TEMPERATURE:-0.6}
      REDIS_URL: redis://redis:6379/0
      API_BASE_URL: http://api:8000
      SERPAPI_KEY: ${SERPAPI_KEY}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      GOOGLE_CLIENT_SECRETS_FILE: /app/config/credentials.json
      GOOGLE_TOKEN_FILE: /app/config/token.json
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: ./services/bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS}
      API_BASE_URL: http://api:8000
      ORCHESTRATOR_URL: http://orchestrator:8001
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      api:
        condition: service_healthy
      orchestrator:
        condition: service_healthy

  memory:
    build:
      context: .
      dockerfile: services/memory/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:${POSTGRES_PASSWORD}@postgres/atlas
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  whatsapp:
    build:
      context: ./services/whatsapp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  chroma_data:
