name: Deploy Atlas to VPS

on:
  push:
    branches:
      - main  # Trigger deployment whenever code is pushed to the main branch

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # The script below runs directly on your VPS
          script: |
            echo "Deploying Atlas to VPS..."
            
            # Ensure the directory exists
            mkdir -p ~/Atlas
            cd ~/Atlas
            
            export REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            
            # If this is the first deploy, clone; otherwise update
            if [ ! -d ".git" ]; then
              echo "First deploy: cloning repository..."
              git clone $REPO_URL .
            else
              echo "Updating existing repository..."
              git remote set-url origin $REPO_URL
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # Build and restart containers using production overrides
            echo "Rebuilding and restarting Docker containers..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            
            echo "Deployment complete! ✅"
