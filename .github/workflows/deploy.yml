name: Deploy Atlas to VPS

on:
  push:
    branches:
      - main  # Trigger deployment whenever code is pushed to the main branch

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via SSH
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'cd ~/Atlas && git pull origin main && docker compose -f docker-compose.yml -f docker-compose.prod.yml build && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d && echo "Deployment complete! ✅"'
